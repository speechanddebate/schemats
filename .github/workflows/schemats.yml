name: Schemats CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
    CI: true
    HUSKY: 0
    TZ: "America/Chicago"
    SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

jobs:
  quality-lint:
    name: Quality - Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build dev-stage CI image
        run: docker build --target dev -t schemats-dev-ci .
      - name: Run lint in dev-stage container
        run: |
          docker run --rm \
            -e CI=true \
            -e HUSKY=0 \
            -e TZ="${TZ}" \
            schemats-dev-ci \
            sh -lc "npm run lint"

  quality-typecheck:
    name: Quality - Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build dev-stage CI image
        run: docker build --target dev -t schemats-dev-ci .
      - name: Run typecheck in dev-stage container
        run: |
          docker run --rm \
            -e CI=true \
            -e HUSKY=0 \
            -e TZ="${TZ}" \
            schemats-dev-ci \
            sh -lc "npm run check:ci"
    continue-on-error: true

  build-app:
    name: Build - App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build app through Docker build stage
        run: docker build --target build -t schemats-build-ci .

  test:
    name: Test - ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs:
      - quality-lint
      - quality-typecheck
      - build-app
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Unit
            command: npm run test:ci:unit
          - name: Storybook A11y
            command: npm run test:ci:a11y
          - name: E2E
            command: npm run test:ci:e2e
    steps:
      - uses: actions/checkout@v6
      - name: Build dev-stage test image
        run: docker build --target dev -t schemats-dev-ci .
      - name: Run ${{ matrix.name }} in dev-stage container
        run: |
          mkdir -p playwright-report
          docker run --rm \
            -e CI=true \
            -e HUSKY=0 \
            -e TZ="${TZ}" \
            -v "${{ github.workspace }}/playwright-report:/app/playwright-report" \
            schemats-dev-ci \
            sh -lc "${{ matrix.command }}"
      - uses: actions/upload-artifact@v4
        if: failure() && matrix.name == 'E2E'
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  gate-required:
    name: Gate - Required Checks
    runs-on: ubuntu-latest
    needs:
      - test
    steps:
      - run: echo "All required checks passed"

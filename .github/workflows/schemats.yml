name: Tabroom Schemats CI

on:
  push:
    branches:
      - main
      - playwright
  pull_request:
    branches:
      - main

env:
    CI: true
    HUSKY: 0
    TZ: "America/Chicago"
    SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v6
        - run: cp config/config.sample.ts config/config.ts
        - uses: actions/setup-node@v6
          with:
            node-version-file: package.json
        - run: npm ci
        - run: npm run lint
    
    typecheck:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v6
        - run: cp config/config.sample.ts config/config.ts
        - uses: actions/setup-node@v6
          with:
            node-version-file: package.json
        - run: npm ci
        - run: npm run check:ci
          continue-on-error: true
    
    test:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v6
        - run: cp config/config.sample.ts config/config.ts
        - uses: actions/setup-node@v6
          with:
            node-version-file: package.json
        - run: npm ci
        - run: npm run test:ci
    
    build:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v6
        - run: cp config/config.sample.ts config/config.ts
        - uses: actions/setup-node@v6
          with:
            node-version-file: package.json
        - run: npm ci
        - run: npm run build

    e2e:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v6
        - run: cp config/config.sample.ts config/config.ts
        - uses: actions/setup-node@v6
          with:
            node-version-file: package.json
        - run: npm ci
        - run: npx playwright install --with-deps
        - run: npm run test:e2e
        - uses: actions/upload-artifact@v4
          if: failure()
          with:
            name: playwright-report
            path: playwright-report/
            retention-days: 7
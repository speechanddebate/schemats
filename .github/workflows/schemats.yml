name: Schemats CI

on:
  push:
    branches:
      - main
      - playwright
  pull_request:
    branches:
      - main

env:
    CI: true
    HUSKY: 0
    TZ: "America/Chicago"
    SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

jobs:
  quality-lint:
    name: Quality - Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cp config/config.sample.ts config/config.ts
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - run: npm ci
      - run: npm run lint

  quality-typecheck:
    name: Quality - Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cp config/config.sample.ts config/config.ts
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - run: npm ci
      - run: npm run check:ci

  build-app:
    name: Build - App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cp config/config.sample.ts config/config.ts
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - run: npm ci
      - run: npm run build

  test:
    name: Test - ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs:
      - quality-lint
      - quality-typecheck
      - build-app
    strategy:
      matrix:
        include:
          - name: Unit
            command: npm run test:ci:unit
          - name: Storybook A11y
            command: npm run test:ci:storybook
          - name: E2E
            command: npm run test:e2e
    steps:
      - uses: actions/checkout@v6
      - run: cp config/config.sample.ts config/config.ts
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - run: npm ci
      - if: matrix.name == 'E2E'
        run: npx playwright install --with-deps

      - run: ${{ matrix.command }}
      - uses: actions/upload-artifact@v4
        if: failure() && matrix.name == 'E2E'
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  gate-required:
    name: Gate - Required Checks
    runs-on: ubuntu-latest
    needs:
      - test
    steps:
      - run: echo "All required checks passed"